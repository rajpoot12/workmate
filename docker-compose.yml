services:
  db:
    image: pgvector/pgvector:pg16
    container_name: workmemory-db
    environment:
      POSTGRES_USER: workmemory
      POSTGRES_PASSWORD: workmemory
      POSTGRES_DB: workmemory
    ports:
      - "5433:5432"
    volumes:
      - workmemory-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workmemory -d workmemory"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  workmemory-pgdata:
